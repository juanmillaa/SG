<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prácticas Sistemas Graficos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
      color: #38bdf8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.1);
    }

    a {
      color: white;
      text-decoration: none;
      font-size: 18px;
    }

    a:hover {
      color: #38bdf8;
    }
  </style>

</head>
<body>

</html>
